services:
  db:
    image: postgres:15
    container_name: rideguard-db
    environment:
      POSTGRES_USER: rideguard
      POSTGRES_PASSWORD: rideguard
      POSTGRES_DB: rideguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rideguard -d rideguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rideguard-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://rideguard:rideguard@db:5432/rideguard
      CORS_ORIGINS: http://localhost:3000
      SECRET_KEY: rideguard-dev-secret-change-me
      TOKEN_ISSUER: rideguard-api
      ACCESS_TOKEN_EXPIRE_MINUTES: "480"
      ENABLE_TRIGGER_MONITOR: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    container_name: rideguard-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
